<style>
html,body{

  font-family:'Segoe UI',sans-serif;

}

.video-bg{
  position:fixed;
  top:0;

  z-index:-2;
}

.overlay{
  position:fixed;

.main-section{

.left-content h1{

}

.contact-link{

  margin-bottom:10px;

}

.contact-form{

  padding:35px;
  border-radius:8px;

/* Floating Fields */
.form-group{
  position:relative;
  margin-bottom:22px;
}

.form-control{
  width:100%;
  padding:14px 12px;
  background:#1e1e1e;
  border:1px solid #444;
  color:#fff;
  border-radius:4px;
  outline:none;
}

.form-control:focus{
  border-color:#00c6ff;
}

.form-label{
  position:absolute;
  top:14px;
  left:12px;
  color:#aaa;
  font-size:14px;
  pointer-events:none;
  transition:0.3s ease;
  background:#111;
  padding:0 5px;
}

.form-control:focus + .form-label,
.form-control:not(:placeholder-shown) + .form-label{
  top:-8px;
  font-size:12px;
  color:#00c6ff;
}

button{
  width:100%;
  padding:12px;
  background:#00c6ff;
  border:none;
  color:#000;
  font-weight:600;
  border-radius:4px;
}

.loading,
.error-message,
.sent-message{
  display:none;
  text-align:center;
  margin-bottom:15px;
  font-weight:500;
}

.loading{ color:#00c6ff; }
.error-message{ color:#ff4d4d; }
.sent-message{ color:#00ff88; }

<!-- Floating WhatsApp Button -->

<!-- JS -->
<script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
emailjs.init("cDrzsn76nRW8yDruG");

const whatsappPhone = "+971581816887";
const whatsappApiKey = "9546639";

document.querySelector('.php-email-form').addEventListener('submit', function(e){
  e.preventDefault();

  const form = this;
  const loading = form.querySelector('.loading');
  const error = form.querySelector('.error-message');
  const sent = form.querySelector('.sent-message');

  loading.style.display = 'block';
  error.style.display = 'none';
  sent.style.display = 'none';

  const formData = {
    name: form.name.value,
    email: form.email.value,
    phone: form.phone.value,
    message: form.message.value
  };

  emailjs.send("service_pm0skbn","template_ef4yl7n",formData)
  .then(()=>{
    emailjs.send("service_pm0skbn","template_o3rfw09",{
      name:formData.name,
      email:formData.email
    }).then(()=>{

      const whatsappText =
`New Contact - VOWTECH
Name: ${formData.name}
Email: ${formData.email}
Phone: ${formData.phone}
Message: ${formData.message}`;

      fetch(`https://api.callmebot.com/whatsapp.php?phone=${whatsappPhone}&text=${encodeURIComponent(whatsappText)}&apikey=${whatsappApiKey}`)
      .finally(()=>{
        loading.style.display='none';
        sent.style.display='block';
        form.reset();
      });

    });
  }).catch(()=>{
    loading.style.display='none';
    error.textContent="Something went wrong. Please try again.";
    error.style.display='block';
  });

});
</script>
